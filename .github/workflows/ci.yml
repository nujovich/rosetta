name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verificar:
    runs-on: ubuntu-latest

    # Postgres efímero para ejercitar la etapa de carga (load) de punta a punta.
    # El esquema es Postgres puro: sirve cualquier Postgres 15+ (acá 16).
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: rosetta
          POSTGRES_PASSWORD: rosetta
          POSTGRES_DB: rosetta
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rosetta -d rosetta"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # Con DATABASE_URL presente, los tests de load corren contra el servicio;
      # sin él (p. ej. en local), se saltean solos y la suite sigue verde.
      DATABASE_URL: postgres://rosetta:rosetta@localhost:5432/rosetta

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run format:check
      - run: npm run fixture
      - run: npm test
